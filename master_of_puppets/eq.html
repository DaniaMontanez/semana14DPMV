<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario</title>
  <link rel="stylesheet" href="style3.css">
</head>
<body>

  <div class="inventory-container">
    <h2 class="title">Control de Equipo (Seek & Destroy)</h2>

    <input 
      type="text" 
      id="buscador" 
      class="search-bar" 
      placeholder="Buscar equipo en el inventario..."
    >

    <ul id="listaEquipo" class="equipment-list">
      <li class="item">Ernie Ball Power Guitar Strings</li>
      <li class="item">James acoustic guitar</li>
      <li class="item">Marshall amplifier</li>
      <li class="item">Fender Stratocaster Guitar</li>
      <li class="item">Ken Lawrence Guitar</li>
      <li class="item">Fender Jazz Bass</li>
      <li class="item">Shure Super 55 Microphone</li>
      <li class="item">Picks</li>
      <li class="item">Tama Artstar II Drums</li>
      <li class="item">Lars Ulrich Drumsticks</li>
    </ul>
  </div>

  <script src="script3.js"></script>
</body>
</html>
